          </svg>

      </div>

      <!-- Google Maps -->
      <div class="contact-map">
        <iframe
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d5259.282262153646!2d-3.5733172229332193!3d48.76964917132037!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x4813d31160fc229b%3A0xb0fa1f7423076555!2s31d%20Rue%20des%20Plages%2C%2022560%20Tr%C3%A9beurden%2C%20France!5e0!3m2!1sfr!2sus!4v1773260634125!5m2!1sfr!2sus"
          width="100%" height="200" style="border:0; border-radius: 13px; display: block;" allowfullscreen=""
          loading="lazy" referrerpolicy="no-referrer-when-downgrade" title="Arrosé – La cave fleurie">
        </iframe>
      </div>

    </div>

    <!-- Formulaire — inchangé -->
    <div>
      <h2>Une demande spécifique ?</h2>
      <form id="contact-form" action="https://formspree.io/f/VOTRE_ID" method="POST">

        <div class="form-field">
          <label for="nom">Nom &amp; Prénom</label>
          <input type="text" id="nom" name="nom" placeholder="Tanguy Dupont" required />
        </div>

        <div class="form-field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="erell@exemple.fr" required />
        </div>

        <div class="form-field">
          <label for="telephone">Téléphone</label>
          <input type="tel" id="telephone" name="telephone" placeholder="06 xx xx xx xx" />
        </div>

        <div class="form-field">
          <label for="sujet">Sujet</label>
          <select id="sujet" name="sujet" required>
            <option value="">Sélectionner…</option>
            <option value="degustation">Dégustation sur mesure</option>
            <option value="fleurs">Commande de fleurs</option>
            <option value="evenement">Évènement (mariage, deuil…)</option>
            <option value="abonnement">Abonnement</option>
            <option value="partenariat">Partenariat</option>
            <option value="autre">Autre</option>
          </select>
        </div>

        <div class="form-field">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" placeholder="Dites-nous tout…" required></textarea>
        </div>

        <button type="submit" class="contact-btn-submit">Envoyer →</button>
        <p class="contact-form-success" id="contact-form-success">✓ Message envoyé ! On vous répond très vite.</p>
      </form>
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <script src="js/components.js"></script>
  <script>
    const form = document.getElementById('contact-form');
    const success = document.getElementById('contact-form-success');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = new FormData(form);
      const res = await fetch(form.action, {
        method: 'POST',
        body: data,
        headers: {
          'Accept': 'application/json'
        }
      });
      if (res.ok) {
        form.reset();
        success.style.display = 'block';
      }
    });
  </script>
</body>

</html>
